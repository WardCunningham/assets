<pre id=result></pre>
<script type="module">
  const show = date => window.result.innerText +=
    `${date.getTime()} ${date.toString().replace(/:00 GMT.*\)/,'')}\n`
  const today = new Date()
  today.setHours(16,0,0)
  today.setMilliseconds(0)
  const t = today.getTime()
  for(const dt of [-3,-2,-1,0,1,2,3]) show(new Date(t+(dt*24*60*60*1000)))
</script>
