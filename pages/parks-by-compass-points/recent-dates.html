<pre id=result>working</pre>
<script type="module">
  const today = new Date()
  today.setHours(16,0,0)
  today.setMilliseconds(0)
  const t = today.getTime()
  const show = date => `${date.getTime()} ${date.toString().replace(/:00 GMT.*\)/,'')}\n`
  const days = dts => dts.map(dt => show(new Date(t+(dt*24*60*60*1000)))).join('')
  window.result.innerText = `${days([-3,-2,-1])}\n${days([0])}\n${days([1,2,3])}`
</script>
